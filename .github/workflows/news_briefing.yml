name: 📬 Daily News Briefing

on:
  schedule:
    # 每天早上 8:00 (北京时间) → UTC 00:00
    - cron: "3 0 * * *"
    # 每天晚上 20:00 (北京时间) → UTC 12:00
    - cron: "3 12 * * *"
  workflow_dispatch:  # 支持手动触发

jobs:
  briefing:
    name: Generate & Push News Briefing
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt

      - name: 🗞️ Run briefing & push to Server酱
        env:
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
        run: |
          python news_briefing.py --push
